version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ai-analyst-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - UPLOADS_DIR=/data/uploads
      - OUTPUTS_DIR=/data/outputs
      - LOG_LEVEL=info
    volumes:
      - analyst_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - analyst_net

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: ai-analyst-app
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - analyst_net

volumes:
  analyst_data:

networks:
  analyst_net:
    driver: bridge
